<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>OERF 研究导航 · 路径转接</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #152624;
      --muted: #5f6f6c;
      --line: #cfdad6;
      --paper: #f7faf8;
      --accent: #16665c;
      --accent-2: #c85c3d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        linear-gradient(rgba(247, 250, 248, .9), rgba(247, 250, 248, .96)),
        url("/oerf-bishe-dashboard/assets/backgrounds/oerf-refractive-field.png")
          center / cover fixed;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    main {
      width: min(680px, 100%);
      border-top: 4px solid var(--accent);
      border-bottom: 1px solid var(--line);
      padding: 34px 0 30px;
    }
    .eyebrow {
      color: var(--accent);
      font-size: 13px;
      font-weight: 750;
      text-transform: uppercase;
    }
    h1 {
      margin: 10px 0 12px;
      font-size: clamp(30px, 7vw, 54px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    p { margin: 0 0 18px; color: var(--muted); line-height: 1.75; }
    code {
      overflow-wrap: anywhere;
      color: var(--ink);
      font-family: "SFMono-Regular", Consolas, monospace;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    a {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      padding: 0 15px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: rgba(255, 255, 255, .82);
      text-decoration: none;
      font-weight: 700;
    }
    a.primary { color: white; border-color: var(--accent); background: var(--accent); }
    [hidden] { display: none !important; }
    .status {
      margin-top: 24px;
      padding-left: 12px;
      border-left: 3px solid var(--accent-2);
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow" id="eyebrow">OERF research route</div>
    <h1 id="title">这个公开路径不存在</h1>
    <p id="message">页面可能已移动。请返回研究主页，或打开当前算子学习与三维重构导航。</p>
    <div class="actions">
      <a class="primary" href="https://gaoyouyang.github.io/oerf-bishe-dashboard/">返回总主页</a>
      <a href="https://gaoyouyang.github.io/oerf-bishe-dashboard/general_operator_research_lab.html">进入研究主线</a>
      <a id="pdfFallback" href="#" hidden>直接打开论文 PDF</a>
    </div>
    <div class="status" id="status">HTTP 404 · 公开站点没有找到这个文件。</div>
  </main>
  <script>
    (() => {
      const projectBase = "/oerf-bishe-dashboard/";
      const pdfPrefix = `${projectBase}paper_library/pdfs/`;
      const path = window.location.pathname;
      if (!path.startsWith(pdfPrefix) || !path.toLowerCase().endsWith(".pdf")) return;

      const relativePath = path.slice(projectBase.length);
      const viewerUrl =
        "https://github.com/GaoYouyang/oerf-bishe-dashboard/blob/main/" +
        relativePath;
      document.getElementById("eyebrow").textContent = "Open paper handoff";
      document.getElementById("title").textContent = "正在转到论文原文件";
      document.getElementById("message").innerHTML =
        "为避免 GitHub Pages 超过体积上限，开放论文 PDF 保留在同一 GitHub 仓库，网页路径会自动转接到原文件。";
      document.getElementById("status").innerHTML =
        `目标：<code>${viewerUrl}</code>`;
      const fallback = document.getElementById("pdfFallback");
      fallback.href = viewerUrl;
      fallback.hidden = false;
      window.location.replace(viewerUrl);
    })();
  </script>
</body>
</html>
